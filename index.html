<!DOCTYPE html>
<html>
<head>
<title>ThinkSmart Challenge</title>

<style>
body{
font-family: Arial, sans-serif;
background: linear-gradient(120deg,#ff9a9e,#fad0c4);
text-align:center;
padding:40px;
}

h1{
color:#333;
}

.card{
background:white;
border-radius:18px;
padding:25px;
margin-top:25px;
box-shadow:0 10px 20px rgba(0,0,0,0.15);
}

button{
background:#6a5acd;
color:white;
border:none;
padding:12px 20px;
border-radius:25px;
font-size:16px;
cursor:pointer;
margin-top:15px;
}

button:hover{
background:#483d8b;
}

.answer{
margin-top:15px;
font-weight:bold;
color:#444;
}
</style>
</head>

<body>

<h1>🧠 ThinkSmart Challenge</h1>
<p>Test your thinking and uncover hidden biases.</p>

<div class="card">
<h2 id="question">If a $100 jacket is discounted to $60, is it a great deal?</h2>

<button onclick="showAnswer()">Reveal the Thinking Bias</button>

<p class="answer" id="answer"></p>
</div>

<button onclick="newChallenge()">Try Another Challenge</button>

<script>

let challenges = [

{
q:"If a $100 jacket is discounted to $60, is it automatically a good deal?",
a:"Anchoring Bias: The original price makes the new price seem cheaper."
},

{
q:"If everyone online says a phone is the best, should you buy it?",
a:"Bandwagon Effect: People follow what the crowd believes."
},

{
q:"If you believe coffee is unhealthy, do you mostly read articles proving it?",
a:"Confirmation Bias: We prefer information that supports our beliefs."
},

{
q:"If a celebrity promotes a product, do you assume it must be good?",
a:"Halo Effect: One positive trait makes us assume everything else is good."
}

]

let current = 0

function showAnswer(){
document.getElementById("answer").innerText = challenges[current].a
}

function newChallenge(){

current = Math.floor(Math.random()*challenges.length)

document.getElementById("question").innerText = challenges[current].q
document.getElementById("answer").innerText = ""

let colors = [
"#ff9a9e",
"#a18cd1",
"#fbc2eb",
"#84fab0",
"#f6d365"
]

let randomColor = colors[Math.floor(Math.random()*colors.length)]

document.body.style.background color = randomColor

}
}

</script>

</body>
</html>
